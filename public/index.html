<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basira — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="/assets/basira-mark.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles.css">
<script src="/strings.js"></script>
</head>
<body class="login-body">

<div class="floating-controls">
  <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="theme-toggle-icon">☾</span>
  </button>
  <nav class="lang-toggle lang-toggle-inline" aria-label="Language">
    <button type="button" class="lang-toggle-btn" data-lang="en">EN</button>
    <button type="button" class="lang-toggle-btn" data-lang="ar">العربية</button>
    <button type="button" class="lang-toggle-btn" data-lang="eg">مصري</button>
  </nav>
</div>

<main class="login-main">

  <section class="login-brand">
    <div class="brand-mark">
      <img class="brand-logo-img brand-logo-img-lg" src="/assets/basira-mark.svg" alt="" aria-hidden="true">
      <div class="brand-wordmark">
        <span class="brand-arabic">بصيرة</span>
        <span class="brand-latin">Basira</span>
      </div>
    </div>
    <p class="brand-tagline" data-i18n="brand.tagline">Patient flow you can actually see.</p>
    <p class="brand-sub" data-i18n="brand.by">by Medicena</p>
  </section>

  <section class="login-card">
    <h1 class="login-title" data-i18n="login.title">Sign in to your hospital</h1>
    <p class="login-helptext" data-i18n="login.help">Use your hospital credentials to continue.</p>

    <form class="login-form" action="/basira" method="get">
      <label class="field">
        <span class="field-label" data-i18n="login.hospital">Hospital</span>
        <select class="field-input" name="hospital" aria-label="Hospital">
          <option>El Salam Specialist Hospital — New Cairo</option>
          <option>Andalusia Maadi (demo)</option>
          <option>Heliopolis Polyclinic (demo)</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label" data-i18n="login.email">Email</span>
        <input class="field-input" type="email" name="email" value="mona.khalil@elsalam.eg" autocomplete="email" aria-label="Email">
      </label>

      <label class="field">
        <span class="field-label" data-i18n="login.password">Password</span>
        <input class="field-input" type="password" name="password" value="••••••••••" autocomplete="current-password" aria-label="Password">
      </label>

      <button class="primary-action" type="submit" data-i18n="login.submit">Sign in</button>
    </form>

    <p class="login-note" data-i18n="login.note">Demo build. Any sign-in opens the dashboard with mock data.</p>
  </section>

</main>

<footer class="login-footer">
  <span>Basira · Medicena · Cairo</span>
  <span class="login-footer-sep">·</span>
  <span data-i18n="login.footer.about">Demo build for Tactful PO take-home</span>
</footer>

<script>
  document.querySelectorAll(".lang-toggle-btn").forEach(function (btn) {
    btn.addEventListener("click", function () { setLang(btn.dataset.lang); });
  });
  applyTheme();
  applyLang();
</script>

</body>
</html>
