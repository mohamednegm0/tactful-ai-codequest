      <stop offset="1" stop-color="#0a1f21"/>
    </linearGradient>
    <linearGradient id="iris" x1="60" y1="58" x2="99" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7ef0ff"/>
