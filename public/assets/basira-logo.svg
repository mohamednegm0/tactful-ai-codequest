<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-labelledby="title desc">
  <title id="title">Basira logo</title>
  <desc id="desc">Basira bilingual logo with an abstract Arabic ba mark and subtle eye-shaped flow aperture.</desc>
  <defs>
    <linearGradient id="mark" x1="24" y1="55" x2="112" y2="99" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b636d"/>
      <stop offset="1" stop-color="#004a52"/>
    </linearGradient>
    <linearGradient id="accent" x1="48" y1="61" x2="99" y2="81" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7ef0ff"/>
      <stop offset="1" stop-color="#29abb9"/>
    </linearGradient>
  </defs>
  <g transform="translate(14 14)">
    <path d="M18 78h45.5C86 78 101.2 66.8 107 49.5" fill="none" stroke="url(#mark)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 63.5C54 54.4 73 53.5 90 61.7" fill="none" stroke="url(#accent)" stroke-width="7.8" stroke-linecap="round"/>
    <path d="M44 71.8C57.4 78.4 76.3 77.1 91 66.7" fill="none" stroke="#d6ecef" stroke-width="4.8" stroke-linecap="round" opacity="0.85"/>
    <circle cx="58" cy="106" r="8" fill="#29abb9"/>
  </g>
  <g transform="translate(140 24)">
    <text x="0" y="56" fill="#004a52" font-family="Cairo, Tahoma, Arial, sans-serif" font-size="62" font-weight="700">بصيرة</text>
    <text x="2" y="108" fill="#0a1f21" font-family="'Plus Jakarta Sans', Inter, Arial, sans-serif" font-size="42" font-weight="700">Basira</text>
  </g>
</svg>
