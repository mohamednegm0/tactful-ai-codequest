<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 192" role="img" aria-labelledby="title desc">
  <title id="title">Basira logo</title>
  <desc id="desc">Basira bilingual logo with a teal visibility mark and Arabic and English wordmark.</desc>
  <defs>
